stages:
  - release

tag-release:
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  stage: release
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  image: docker:27.5.0-rc.1-dind-alpine3.21
  services:
    - docker:dind
  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  script:
    - apk add curl git python3
    - LAST_COMMIT=$(git log -1 --pretty=%B) # Last commit message
    - LAST_COMMIT=$(git log -1 --pretty=%B) # Last commit message
    - LAST_AUTHOR=$(git log -1 --pretty=%an) # Last commit author
    - |
      if [[ "$LAST_AUTHOR" == "Flux" ]]; then
        echo "Last commit was made by Flux. Skipping deployment to avoid infinite loop."
        exit 0
      fi
    - LAST_TAG=$(git describe --tags --abbrev=0) # Last tag in the repo
    - NEXT_TAG=$(python3 next_version.py ${LAST_TAG} ${LAST_COMMIT})
    - echo Pushing new version tag ${NEXT_TAG}
    - curl -k --request POST --header "PRIVATE-TOKEN:${TAG_TOKEN}" --url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags?tag_name=${NEXT_TAG}&ref=main"
    - docker build --pull -t "$DOCKER_IMAGE_NAME" .
    - docker push "$DOCKER_IMAGE_NAME"
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:$NEXT_TAG"
        docker push "$CI_REGISTRY_IMAGE:$NEXT_TAG"
      fi
