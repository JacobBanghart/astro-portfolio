name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/jacobbanghart/astro-portfolio

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.head_commit.author.name != 'fluxcdbot'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0)
          LAST_COMMIT=$(git log -1 --pretty=%B)
          NEXT_TAG=$(python3 next_version.py "${LAST_TAG}" "${LAST_COMMIT}")
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          pull: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.next_tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Tag release
        run: |
          git tag "${{ steps.version.outputs.next_tag }}"
          git push origin "refs/tags/${{ steps.version.outputs.next_tag }}"
