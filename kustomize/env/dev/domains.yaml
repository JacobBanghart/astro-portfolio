---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: astro-portfolio-dev
  name: astro-portfolio
  labels:
    name: astro-portfolio
spec:
  rules:
    - host: dev-portfolio.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: astro-portfolio
                port:
                  number: 8080