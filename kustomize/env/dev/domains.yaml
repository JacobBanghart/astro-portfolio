---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-portfolio-ingress
spec:
  rules:
    - host: dev-portfolio.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: astro-portfolio
                port:
                  number: 8080
